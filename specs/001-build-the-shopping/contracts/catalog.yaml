openapi: 3.1.0
info:
  title: Catalog API
  version: 0.1.0-draft
paths:
  /api/catalog/products:
    get:
      summary: List products
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
  /api/catalog/products/{id}:
    get:
      summary: Get product detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '404':
          description: Not found
components:
  schemas:
    Pagination:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
    ProductSummary:
      type: object
      required: [id, title, price_cents, status]
      properties:
        id: { type: string }
        title: { type: string }
        price_cents: { type: integer }
        currency: { type: string, default: USD }
        status: { type: string }
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            description: { type: string }
            images:
              type: array
              items: { type: string }
            variants:
              type: array
              items:
                type: object
                properties:
                  variant_id: { type: string }
                  size: { type: string }
                  color: { type: string }
                  quantity_available: { type: integer }
